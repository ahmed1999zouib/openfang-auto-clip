name: Bug report
description: Report a reproducible defect in the local workflow, CLI, or web manager
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect in one or two sentences.
      placeholder: The benchmark demo fails when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command or interaction sequence.
      placeholder: |
        1. Run `python3 scripts/run_demo_benchmark.py`
        2. Open the generated report
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, ffmpeg version, and relevant setup details.
      placeholder: |
        - OS: macOS 15
        - Python: 3.11
        - ffmpeg: 8.0.1
        - openfang: not installed
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the relevant output or attach screenshots.
