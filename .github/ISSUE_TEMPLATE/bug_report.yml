name: Bug report / 缺陷反馈
description: Report a reproducible defect in the local workflow, CLI, or web manager / 提交可复现的本地工作流、CLI 或 Web 管理器问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect in one or two sentences. / 用一两句话描述问题。
      placeholder: The benchmark demo fails when... / benchmark 演示在以下情况下失败...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command or interaction sequence. / 请给出完整命令或操作步骤。
      placeholder: |
        1. Run `python3 scripts/run_demo_benchmark.py`
        2. Open the generated report
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, ffmpeg version, and relevant setup details. / 操作系统、Python、ffmpeg 版本及相关环境信息。
      placeholder: |
        - OS: macOS 15
        - Python: 3.11
        - ffmpeg: 8.0.1
        - openfang: not installed
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the relevant output or attach screenshots. / 粘贴相关日志或附上截图。
