name: Feature request / 功能建议
description: Propose a concrete product or workflow improvement / 提交明确的产品或工作流改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or contributor problem are you trying to solve? / 你想解决什么使用者或贡献者问题？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the workflow, API, CLI flag, or UI change you want. / 描述你期望的工作流、API、CLI 参数或 UI 改动。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention current workarounds or related tools. / 说明当前替代方案、绕行方法或相关工具。

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How should we know this is done? / 如何判断这个需求完成了？
      placeholder: A user can run one command and... / 用户可以执行一条命令并且...
